<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in · Kilter</title>
  <style>
    :root {
      --c-bg:        #f7f8fa;
      --c-surface:   #ffffff;
      --c-border:    #e4e7eb;
      --c-border-strong: #cbd2d9;
      --c-text:      #0f172a;
      --c-text-muted:#52606d;
      --c-text-subtle:#9aa5b1;
      --c-primary:   #1f3a8a;
      --c-primary-hover: #1e40af;
      --c-primary-soft:  #eff4fb;
      --c-danger:    #b91c1c;
      --c-danger-soft: #fee2e2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0b1220 0%, #1e3a8a 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, sans-serif;
      color: var(--c-text); padding: 24px;
    }
    .card {
      width: 100%; max-width: 420px;
      background: var(--c-surface); border-radius: 12px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.35);
      padding: 36px 32px;
    }
    .brand {
      display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
    }
    .brand .mark {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, #2563eb 0%, #0891b2 100%);
      color: white; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px;
    }
    .brand .name { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    h1 { margin: 0 0 6px 0; font-size: 22px; font-weight: 700; letter-spacing: -0.2px; }
    .sub { color: var(--c-text-muted); font-size: 14px; margin-bottom: 24px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--c-text-muted); margin-bottom: 4px; font-weight: 500; }
    .field input {
      width: 100%; padding: 10px 12px; font-size: 14px;
      border: 1px solid var(--c-border-strong); border-radius: 6px;
      font-family: inherit; background: #fafbfc;
    }
    .field input:focus { outline: none; border-color: var(--c-primary); box-shadow: 0 0 0 3px var(--c-primary-soft); }
    .field input.code {
      font-size: 24px; letter-spacing: 8px; text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    button {
      width: 100%; background: var(--c-primary); color: white;
      border: 0; padding: 11px; border-radius: 6px; font-size: 14px;
      font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    button:hover:not(:disabled) { background: var(--c-primary-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      margin-top: 14px; padding: 10px 12px; border-radius: 6px;
      background: var(--c-danger-soft); color: var(--c-danger);
      font-size: 13px; display: none;
    }
    .helper {
      margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--c-border);
      font-size: 12px; color: var(--c-text-subtle); text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="mark">K</div>
      <div>
        <div class="name">Kilter</div>
        <div style="font-size:11px;color:var(--c-text-subtle);letter-spacing:0.4px;text-transform:uppercase;font-weight:600;margin-top:-2px">
          Nostro &amp; GL Reconciliation
        </div>
      </div>
    </div>
    <h1>Sign in</h1>
    <p class="sub">Enter your username and the 6-digit code from Microsoft Authenticator.</p>

    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password <span style="color:var(--c-text-subtle);font-weight:400">— if AD-authenticated</span></label>
        <input id="password" name="password" type="password" autocomplete="current-password">
      </div>
      <div class="field">
        <label for="code">Authenticator code</label>
        <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}"
               maxlength="6" autocomplete="one-time-code" class="code" required placeholder="000000">
      </div>
      <button type="submit" id="submit">Sign in</button>
      <div class="error" id="error"></div>
    </form>
    <div class="helper">
      First time here? Use the enrollment link from your admin to set up Microsoft Authenticator.
    </div>
  </div>
  <div style="position:fixed;bottom:14px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.55);font-size:11px;letter-spacing:0.3px">
    Kilter · Nostro &amp; GL reconciliation · Internal use only
  </div>

<script>
  const form = document.getElementById('login-form');
  const err = document.getElementById('error');
  const submit = document.getElementById('submit');
  const stored = localStorage.getItem('kilter_user');
  if (stored) document.getElementById('username').value = stored;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.style.display = 'none';
    submit.disabled = true; submit.textContent = 'Signing in...';
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const code = document.getElementById('code').value.trim();
    try {
      const r = await fetch('/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, totp_code: code }),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.detail || 'Sign-in failed');
      localStorage.setItem('kilter_user', username);
      localStorage.setItem('kilter_token', j.token);
      localStorage.setItem('kilter_token_expires', j.expires_at);
      // Mirror the token to a cookie so server-rendered page routes
      // opened via plain `<a href>` navigation can authenticate too
      // (e.g. /certificates/{id}/print, opened in a new tab).
      // SameSite=Strict so it never ships cross-site; Secure flag is
      // intentionally omitted because the dev/pilot deployment runs
      // over plain HTTP — production behind TLS should add Secure.
      const expSecs = Math.max(0,
        Math.floor((new Date(j.expires_at).getTime() - Date.now()) / 1000));
      document.cookie = `kilter_token=${j.token}; Max-Age=${expSecs}; Path=/; SameSite=Strict`;
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('next') || '/';
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      submit.disabled = false; submit.textContent = 'Sign in';
      document.getElementById('code').value = '';
      document.getElementById('code').focus();
    }
  });
</script>
</body>
</html>
