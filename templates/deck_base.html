<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Kilter Deck{% endblock %}</title>
  <style>
    :root {
      --bg-deep:    #05090f;
      --bg-mid:     #0b1220;
      --bg-card:    #131c2e;
      --ink:        #f1f5f9;
      --ink-muted:  #a0aec0;
      --ink-dim:    #64748b;
      --brand:      #2563eb;
      --brand-2:    #06b6d4;
      --accent:     #8b5cf6;
      --success:    #10b981;
      --warn:       #f59e0b;
      --danger:     #ef4444;
      --border:     #1e293b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100vw; height: 100vh;
      overflow: hidden;
      background: var(--bg-deep); color: var(--ink);
      font-family: "Segoe UI", "Inter", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    /* --- Deck layout --- */
    .deck {
      position: relative; width: 100vw; height: 100vh; overflow: hidden;
    }
    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 60px 80px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .slide.active { opacity: 1; pointer-events: auto; }
    .slide-inner {
      width: 100%; max-width: 1080px; min-height: 0;
    }

    /* --- Typography --- */
    h1 {
      font-size: 60px; font-weight: 800; letter-spacing: -2px;
      margin: 0 0 20px 0; line-height: 1.05;
      background: linear-gradient(135deg, #ffffff 0%, #a7c5ff 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    h2 {
      font-size: 42px; font-weight: 700; letter-spacing: -1px;
      margin: 0 0 16px 0; line-height: 1.1;
    }
    h3 {
      font-size: 20px; font-weight: 600; margin: 0 0 8px 0;
      color: var(--ink-muted); letter-spacing: 1px;
      text-transform: uppercase;
    }
    p { font-size: 22px; line-height: 1.55; color: var(--ink-muted); margin: 16px 0; }
    p.lead { font-size: 28px; color: var(--ink); }
    ul { font-size: 22px; line-height: 1.7; color: var(--ink-muted); padding-left: 24px; }
    ul li { margin: 6px 0; }
    strong { color: var(--ink); }
    code, kbd {
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      background: var(--bg-card); padding: 2px 8px; border-radius: 4px;
      color: var(--brand-2); font-size: 0.88em;
    }
    kbd {
      border: 1px solid var(--border); border-bottom-width: 2px;
      color: var(--ink);
    }

    /* --- Cover slide --- */
    .cover .eyebrow {
      font-size: 14px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--brand-2); margin-bottom: 24px; font-weight: 700;
    }
    .cover h1 { font-size: 80px; margin-bottom: 20px; }
    .cover .sub {
      font-size: 26px; color: var(--ink-muted); max-width: 720px;
      line-height: 1.4;
    }
    .cover .meta {
      margin-top: 60px; font-size: 14px; color: var(--ink-dim);
      letter-spacing: 2px; text-transform: uppercase;
    }

    /* --- Section divider slides --- */
    .section-title { text-align: center; }
    .section-title .kicker {
      font-size: 16px; letter-spacing: 8px; text-transform: uppercase;
      color: var(--brand-2); margin-bottom: 20px;
    }
    .section-title h1 {
      font-size: 96px;
      background: linear-gradient(135deg, #fff 0%, #93c5fd 50%, #a78bfa 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    /* --- Column grids --- */
    .cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
    .cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; }
    .cols-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

    /* --- Cards --- */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 24px 28px; border-radius: 12px;
    }
    .card h2 { font-size: 22px; margin-bottom: 8px; }
    .card p { font-size: 16px; margin: 4px 0; }
    .card .icon { font-size: 28px; margin-bottom: 8px; }

    .stat-card { text-align: left; }
    .stat-card .num {
      font-size: 56px; font-weight: 800; letter-spacing: -2px;
      background: linear-gradient(135deg, #60a5fa 0%, #22d3ee 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      line-height: 1;
    }
    .stat-card .lbl {
      font-size: 14px; color: var(--ink-dim); letter-spacing: 1px;
      text-transform: uppercase; margin-top: 10px;
    }
    .stat-card .sub { font-size: 14px; color: var(--ink-muted); margin-top: 6px; }

    /* --- Contrast table (Kilter vs legacy stack) --- */
    .vs-table { width: 100%; font-size: 18px; border-collapse: collapse; }
    .vs-table th, .vs-table td {
      padding: 14px 20px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .vs-table th {
      font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--ink-dim);
    }
    .vs-table .good { color: var(--success); font-weight: 600; }
    .vs-table .bad  { color: var(--danger);  font-weight: 600; }
    .vs-table .meh  { color: var(--warn); }

    /* --- Badges --- */
    .badge {
      display: inline-block; padding: 4px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; vertical-align: middle;
    }
    .badge-green { background: rgba(16,185,129,0.18); color: #6ee7b7; }
    .badge-blue  { background: rgba(37,99,235,0.22);  color: #93c5fd; }
    .badge-amber { background: rgba(245,158,11,0.18); color: #fcd34d; }
    .badge-red   { background: rgba(239,68,68,0.18);  color: #fca5a5; }

    /* --- Quote / callout --- */
    .quote {
      font-size: 30px; font-weight: 500; line-height: 1.4;
      color: var(--ink); max-width: 900px; position: relative;
      padding-left: 30px;
    }
    .quote::before {
      content: '"'; position: absolute; left: -6px; top: -40px;
      font-size: 160px; color: var(--brand); font-family: Georgia, serif;
      line-height: 1;
    }
    .quote .attr {
      font-size: 16px; color: var(--ink-dim); margin-top: 20px;
      text-transform: uppercase; letter-spacing: 2px;
    }

    /* --- Progress bar + controls --- */
    .deck-chrome {
      position: fixed; bottom: 0; left: 0; right: 0; height: 32px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; font-size: 12px; color: var(--ink-dim);
      background: rgba(5,9,15,0.8); backdrop-filter: blur(6px);
      border-top: 1px solid var(--border); z-index: 5;
    }
    .deck-chrome .counter { font-variant-numeric: tabular-nums; }
    .deck-chrome a { color: var(--ink-muted); text-decoration: none; margin-left: 14px; }
    .deck-chrome a:hover { color: var(--ink); }
    .progress {
      position: fixed; top: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      transition: width 0.3s ease; z-index: 6;
    }

    /* --- Overview / jumper --- */
    .jumper-backdrop {
      position: fixed; inset: 0; background: rgba(2,6,23,0.92);
      display: none; z-index: 20; padding: 40px;
      overflow-y: auto;
    }
    .jumper-backdrop.open { display: block; }
    .jumper-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px; max-width: 1200px; margin: 0 auto;
    }
    .jumper-thumb {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; cursor: pointer;
      font-size: 13px; color: var(--ink-muted);
      min-height: 100px; display: flex; flex-direction: column;
      gap: 6px; transition: border-color 0.1s;
    }
    .jumper-thumb:hover { border-color: var(--brand); }
    .jumper-thumb .num {
      font-size: 11px; color: var(--ink-dim);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .jumper-thumb .ttl { color: var(--ink); font-weight: 600; }

    /* --- Speaker notes --- */
    .notes {
      position: fixed; bottom: 50px; left: 20px; right: 20px;
      max-height: 40vh; overflow-y: auto; padding: 18px 24px;
      background: rgba(11,18,32,0.95);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--ink-muted); font-size: 14px; line-height: 1.5;
      display: none; z-index: 10;
    }
    .notes.open { display: block; }
    .notes strong { color: var(--brand-2); }

    /* --- Misc --- */
    .muted { color: var(--ink-dim); }
    .gradient-line {
      height: 4px; width: 120px;
      background: linear-gradient(90deg, var(--brand), var(--accent));
      margin: 20px 0;
    }

    /* Screenshot frame — used on slides that show a product capture.
       Adds a subtle browser-chrome dot row + drop shadow so the image
       reads as "the product" rather than a free-floating bitmap. The
       frame is dark to match the deck; on light captures the contrast
       is what sells the polish. */
    .shot {
      display: block; max-width: 100%; height: auto;
      border-radius: 10px;
      background: var(--bg-card);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55),
                  0 1px 0 rgba(255, 255, 255, 0.05) inset,
                  0 0 0 1px var(--border);
    }
    .shot-frame {
      display: inline-block; max-width: 100%;
      border-radius: 12px; overflow: hidden;
      background: linear-gradient(180deg, #1e293b 0%, #131c2e 28px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55),
                  0 0 0 1px var(--border);
      padding-top: 28px; position: relative;
    }
    .shot-frame::before {
      content: ''; position: absolute; top: 10px; left: 14px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444;
      box-shadow: 14px 0 0 #f59e0b, 28px 0 0 #10b981;
    }
    .shot-frame .shot {
      display: block; box-shadow: none; border-radius: 0;
    }
    .shot-caption {
      display: block; margin-top: 12px;
      font-size: 14px; color: var(--ink-dim);
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    /* Layout helpers for screenshot-led slides — image left, copy right
       (or the inverse). Both columns vertically centred. */
    .split-shot {
      display: grid; grid-template-columns: 1.1fr 1fr;
      gap: 50px; align-items: center;
    }
    .split-shot.reverse { grid-template-columns: 1fr 1.1fr; }

    /* Print-to-PDF rules. The Save PDF button (and the P shortcut)
       call window.print() which routes through these — modern Chromium
       honors @page so the recipient gets one landscape slide per page
       with zero margin, full-bleed dark theme, no chrome. */
    @page { size: landscape; margin: 0; }
    @media print {
      html, body, .deck {
        height: auto !important; overflow: visible !important;
        background: var(--bg-deep) !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .slide {
        position: static !important; opacity: 1 !important;
        pointer-events: auto !important;
        page-break-after: always; break-after: page;
        min-height: 100vh; width: 100vw;
      }
      .slide:last-of-type { page-break-after: auto; break-after: auto; }
      .deck-chrome, .progress, .jumper-backdrop, .notes { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="progress" id="progress" style="width:0%"></div>

  <div class="deck" id="deck">
    {% block slides %}{% endblock %}
  </div>

  <div class="notes" id="notes"></div>

  <div class="jumper-backdrop" id="jumper">
    <div class="jumper-grid" id="jumper-grid"></div>
  </div>

  <div class="deck-chrome">
    <div class="counter"><span id="n-current">1</span> / <span id="n-total">1</span> · <span id="slide-title"></span></div>
    <div>
      <a href="#" onclick="event.preventDefault();toggleNotes()"><kbd>N</kbd> notes</a>
      <a href="#" onclick="event.preventDefault();toggleJumper()"><kbd>Esc</kbd> overview</a>
      <a href="#" onclick="event.preventDefault();toggleFullscreen()"><kbd>F</kbd> fullscreen</a>
      <a href="#" onclick="event.preventDefault();printDeck()" title="Save deck as PDF (landscape, one slide per page)"><kbd>P</kbd> save PDF</a>
      <a href="/">Exit deck</a>
    </div>
  </div>

<script>
  const slides = Array.from(document.querySelectorAll('.slide'));
  let idx = 0;

  function render() {
    slides.forEach((s, i) => s.classList.toggle('active', i === idx));
    document.getElementById('n-current').textContent = idx + 1;
    document.getElementById('n-total').textContent = slides.length;
    const titleEl = slides[idx].querySelector('h1, h2');
    document.getElementById('slide-title').textContent = titleEl ? titleEl.textContent.slice(0, 60) : '';
    document.getElementById('progress').style.width = `${(idx + 1) / slides.length * 100}%`;
    const note = slides[idx].dataset.notes || '';
    document.getElementById('notes').innerHTML = note;
    // Sync URL hash so a specific slide is linkable.
    history.replaceState(null, '', '#s' + (idx + 1));
  }

  function next() { if (idx < slides.length - 1) { idx++; render(); } }
  function prev() { if (idx > 0) { idx--; render(); } }
  function go(i) { idx = Math.max(0, Math.min(slides.length - 1, i)); render(); }

  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  // Save the whole deck as a PDF. The print CSS at the top of this
  // file forces every slide visible + page-breaks between them, so
  // the browser's print dialog renders 1 slide per landscape page.
  // In Chrome/Edge, "Save as PDF" is the default destination. Tip
  // for Safari users: pick "Save to Files" instead.
  function printDeck() {
    // Close transient overlays so they don't bleed into the print.
    document.getElementById('jumper').classList.remove('open');
    document.getElementById('notes').classList.remove('open');
    window.print();
  }
  function toggleNotes() {
    document.getElementById('notes').classList.toggle('open');
  }
  function toggleJumper() {
    const j = document.getElementById('jumper');
    if (!j.classList.contains('open')) {
      j.innerHTML = '<div class="jumper-grid">' + slides.map((s, i) => {
        const h = s.querySelector('h1, h2');
        return `<div class="jumper-thumb" onclick="go(${i}); toggleJumper()">
          <div class="num">Slide ${i + 1}</div>
          <div class="ttl">${h ? h.textContent : 'Untitled'}</div>
        </div>`;
      }).join('') + '</div>';
    }
    j.classList.toggle('open');
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ')       { next(); e.preventDefault(); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp')                       { prev(); e.preventDefault(); }
    else if (e.key === 'Home')                                                  { go(0); e.preventDefault(); }
    else if (e.key === 'End')                                                   { go(slides.length - 1); e.preventDefault(); }
    else if (e.key === 'Escape')                                                { toggleJumper(); e.preventDefault(); }
    else if (e.key === 'f' || e.key === 'F')                                    { toggleFullscreen(); e.preventDefault(); }
    else if (e.key === 'n' || e.key === 'N')                                    { toggleNotes(); e.preventDefault(); }
    else if (e.key === 'p' || e.key === 'P')                                    { printDeck(); e.preventDefault(); }
    else if (/^\d$/.test(e.key))                                                {
      const n = parseInt(e.key, 10); if (n >= 1) go(n - 1);
    }
  });

  document.getElementById('deck').addEventListener('click', (e) => {
    // Clicking the right half of the screen advances; left half goes back.
    // Skip if the user clicked an actual link/button.
    if (e.target.closest('a, button')) return;
    const half = window.innerWidth / 2;
    if (e.clientX > half) next(); else prev();
  });

  // Initial render: honor #sN hash.
  const m = window.location.hash.match(/^#s(\d+)$/);
  if (m) idx = Math.max(0, Math.min(slides.length - 1, parseInt(m[1], 10) - 1));
  render();
</script>
</body>
</html>
