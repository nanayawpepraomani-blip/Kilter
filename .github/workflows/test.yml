# Kilter — continuous integration.
#
# Runs pytest on every push to any branch and every PR targeting main.
# Pins Python 3.13 to match the production Dockerfile so we never ship
# a regression that only the container would catch.
#
# If this workflow fails on `main`, fix forward — do not merge another
# PR until it's green.

name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref so we don't queue stale work.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          KILTER_SECRET_KEY: ""
          KILTER_DEV: "1"
        run: |
          python -m pytest tests/ -v --tb=short --maxfail=5

      - name: Syntax-check app.py (smoke)
        run: |
          python -c "import ast; ast.parse(open('app.py').read()); print('app.py parses OK')"
